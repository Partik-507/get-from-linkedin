<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VivaVault — IITM BS Viva Preparation</title>
    <meta name="description" content="Premium viva preparation platform for IITM BS students. Curated questions, community experiences, and collaborative answers." />
    <meta name="author" content="VivaVault" />
    
    <!-- Google Fonts: Syne, DM Mono, DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

    <script>
      (function(){
        var t=localStorage.getItem('vivavault_theme');
        var resolved = t;
        if(!t || t==='system'){
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(resolved);
      })();
    </script>

    <meta property="og:title" content="VivaVault — IITM BS Viva Preparation" />
    <meta property="og:description" content="Premium viva preparation platform for IITM BS students." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
